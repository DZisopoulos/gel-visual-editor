name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify tag and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} implies version ${TAG_VERSION}, but package.json says ${PKG_VERSION}. Bump package.json and re-tag."
            exit 1
          fi
          echo "Releasing version ${PKG_VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build:
    name: Build ${{ matrix.label }}
    needs: verify
    runs-on: ${{ matrix.os }}

    # Windows only for now. The Linux AppImage build failed on its first run
    # and is not needed yet; re-add an ubuntu-latest entry here to bring it
    # back (electron-builder.yml still carries the AppImage target).
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows portable
            platform: win
            artifact: gve-windows
            files: dist/*portable.exe

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build

      - name: Package ${{ matrix.label }}
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build output
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
