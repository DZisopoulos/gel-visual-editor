appId: com.dzisopoulos.gve
productName: GVE — GEL Visual Editor
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: gve
  target:
    - portable
portable:
  artifactName: ${name}-${version}-portable.${ext}
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: GVE opens and saves flow and GEL files you choose.
    - NSDownloadsFolderUsageDescription: GVE opens and saves flow and GEL files you choose.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
  maintainer: Dimitrios Zisopoulos
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
